<!DOCTYPE html>
<!--[if lt IE 7]>      <html class="no-js lt-ie9 lt-ie8 lt-ie7"> <![endif]-->
<!--[if IE 7]>         <html class="no-js lt-ie9 lt-ie8"> <![endif]-->
<!--[if IE 8]>         <html class="no-js lt-ie9"> <![endif]-->
<!--[if gt IE 8]>      <html class="no-js"> <!--<![endif]-->
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="description" content="ClientBase - Telemarketing software">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,700;1,400&display=swap" rel="stylesheet">
        <title>ClientBase</title>
        <link rel="stylesheet" href="app/scss/styles.css">
    </head>
    <body>
        <main>
            <header>
                <nav class="flex flex-jc-sb flex-ai-c">
                    <a href="#" class="logo"> ClientBase </a>

                    <a href="#" class="user flex flex-ai-c"> 
                        <img src=images/user-icon.png alt="user-icon" width=32px height=32px />
                        WEST
                    </a>
                </nav>
            </header>
            <hr class="line_header"/>
            
            <div class="grid_column_1 flex flex-ai-c flex-jc-sb margin_bottom_medium">
                <button type="button" class="button_primary"> Add&nbsp;Customer </button>
                <form>
                    <input type="text" class="search_bar" autoComplete="off" placeholder=" Search..." />
                </form>
            </div>

            <div class="grid_column_1">
                <p class="section_title flex flex-jc-c"> Call List </p>
                <hr />
                <div class="section_content section_divider">
                    <ul id="callList"> </ul>
                </div>
            </div>
            <div class="grid_column_2">
                <p class="section_title flex flex-jc-c"> To be confirmed </p>
                <hr />
                <div class="section_content section_divider">
                    <ul id="toBeConfirmed"> </ul>
                </div>
            </div>
            <div class="grid_column_3">
                <p class="section_title flex flex-jc-c"> Confirmed </p>
                <hr />
                <div class="section_content">
                    <ul id="confirmed"> </ul>
                </div>
            </div>

            <div class="form-popup" id="customerPopup">
                <form action="" class="form-container">
                    <header>
                        <nav class="flex flex-jc-sb flex-ai-c">
                            <p id="name" class="size_medium color_primary"></p>
                            <div class="flex flex-ai-c">
                                <button type="button" class="button_secondary"> Edit </button>
                                <span class="close_form" onClick="closeCustomerForm()">
                            </div>
                        </nav>
                        <hr class="line_header" />
                    </header>
                    <div class="details_1">
                        <p class="size_small">Contact number</p>
                        <p class="size_small">Email address</p>
                        <br />
                        <p class="size_small">Address</p>
                        <p class="size_small">Suburb</p>
                        <p class="size_small">City</p>
                        <p class="size_small">Postcode</p>
                        <br />
                        <p class="size_small">Fresh air system</p>
                        <br />
                    </div>
                    <div class="details_2">
                        <p id="cn" class="customer_detail"></p>
                        <p id="ea" class="customer_detail"></p>
                        <br />
                        <p id="add" class="customer_detail"></p>
                        <p id="sub" class="customer_detail"></p>
                        <p id="ci" class="customer_detail"></p>
                        <p id="pc" class="customer_detail"></p>
                        <br />
                        <p id="fa" class="customer_detail"></p>
                    </div>
                    <div class="comments">
                        <p class="size_small">Customer Notes:</p>
                        <p id="n" class="size_small"></p>
                    </div>
                    <div class="result">
                        <button type="button" class="button_primary drop_button" onclick="openDropButton()"> Call&nbsp;result </button>
                        <div id="callResultDropdown" class="drop_content">
                            <li onclick="setConfirmed()"> Confirmed </li>
                            <li onclick="setToBeConfirmed()"> To be confirmed </li>
                            <li onclick="setCallBack()"> Call back later </li>
                            <li onclick="setCallBack()"> Declined </li>
                        </div>
                        <br />
                        <br />
                        <label for="cbDate"> Call back on: </label>
                        <input type="date" id="cbDate" value="2022-02-25">
                    </div>
                </form>
            </div>
        </main>
        <script src="app/js/script.js"></script>
    </body>
</html>
