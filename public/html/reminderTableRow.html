<tr class="reminder-item">
    <td>
        <div class="reminder-date-cell">
            <div class="date-box">
                <div class="date-day"></div>
                <div class="date-month"></div>
            </div>
            <div class="date-info">
                <div class="date-full"></div>
            </div>
        </div>
    </td>
    <td>
        <div class="client-info">
            <div class="client-name"></div>
            <div class="client-company"></div>
        </div>
    </td>
    <td>
        <div class="reminder-note"></div>
    </td>
    <td><span class="status-badge overdue"></span></td>
    <td>
        <div class="action-buttons">
            <button class="btn-icon complete" title="Mark Complete">✓</button>
            <button class="btn-icon edit cd-edit-reminder-btn" title="Edit">✏️</button>
            <button class="btn-icon delete" title="Delete">🗑️</button>
        </div>
    </td>
</tr>
