<!-- Client popups for the callList -->
<div class="clientPopup">
    <!-- Header -->
    <div class="flex flex-ai-c flex-jc-sb margin_b_sm margin_t_sm">
        <p class="popupHeader">  </p>
        <span class="close-button">&times</span>
    </div>

    <form id="reminderPopupForm">
        <!-- Action inputs -->
        <div class="actionsDiv">
            <p class="bold size_v_small"> Action </p>
            <input id="rCallInput" type="radio" name="action" class="revealCallOutcomes" value="call">
            <label for="rCallInput"> Call </label> 
            <input id="rTextInput" type="radio" name="action" class="hideCallOutcomes" value="text">
            <label for="rTextInput"> Text </label> 
            <input id="rEmailInput" type="radio" name="action" class="hideCallOutcomes" value="email">
            <label for="rEmailInput"> Email </label>
            <input id="rIgnoreInput" type="radio" name="action" class="hideCallOutcomes" value="ignore">
            <label for="rIgnoreInput"> Ignore </label>
            <br /> <br />
        </div>


        <div class="hidden callOutcomes" >
            <p class="bold size_v_small"> Outcome </p>
            <input id="rBInput" type="radio" name="outcome" value="booked">
            <label for="rBInput"> Booked </label>
            <input id="rFULInput" type="radio" name="outcome" value="followUp">
            <label for="rFULInput"> Follow up later </label>
            <input id="rDecInput" type="radio" name="outcome" value="declined">
            <label for="rDecInput"> Declined </label>
            <input id="rNoAnsInput" type="radio" name="outcome" value="noAns">
            <label for="rNoAnsInput"> No answer </label>        
            <br /> <br />
        </div>

        <!-- Add notes -->
        <span style="color: black;"> Add note: </span> <br />
        <div class="flex flex-jc-c">
            <textarea name="note" style="width: 260px;" cols="27" rows="3"></textarea>
        </div>
        <br />
        <!-- Previous notes -->
        <div id="popupNotesDiv">
            <p class="bold size_v_small"> Client notes </p>
            <ul id="reminderPopupNotes" class="commentsList"></ul>
            <br />
        </div>
        
        <!-- Previous interactions, shown in awaiting, and follow up lists -->
        <div class="interactionsDiv">
            <p class="bold size_v_small"> Previous interactions </p>
            <ul id="reminderPopupInteractions" class="commentsList"></ul>
            <br />
        </div>


        <!-- Client details link and Submit button -->
        <div style="text-align: center;">
            <a id="reminderPopupDetailsLink" class="color_secondary"> Client Details </a>
            <br /> <br />
            <button id="reminderPopupSubmitButton" type="button" class="button_primary"> Submit </button>
        </div>
    </form>
</div>
