<!-- Client popups for the callList -->
<div class="popup popup-reminder">
    <!-- Header -->
    <div class="popupHeaderDiv">
        <p class="popupHeader">  </p>
        <span class="close-button">&times</span>
    </div>
    <br />
    <form id="reminderPopupForm">
        <!-- Action inputs -->
        <div class="actionsDiv">
            <p class="popupHeader2"> Action </p>
            <input id="rCallInput" type="radio" name="action" class="revealCallOutcomes hideNextReminder" value="call">
            <label for="rCallInput"> Call </label> 
            <input id="rTextInput" type="radio" name="action" class="hideCallOutcomes hideNextReminder" value="text">
            <label for="rTextInput"> Text </label> 
            <input id="rEmailInput" type="radio" name="action" class="hideCallOutcomes hideNextReminder" value="email">
            <label for="rEmailInput"> Email </label>
            <input id="rIgnoreInput" type="radio" name="action" class="hideCallOutcomes revealNextReminder" value="ignore">
            <label for="rIgnoreInput"> Ignore </label>
            <br /> <br />
        </div>

        <div class="hidden callOutcomes" >
            <p class="popupHeader2"> Outcome </p>
            <input id="rBInput" type="radio" name="outcome" value="booked" class="revealNextReminder">
            <label for="rBInput"> Booked </label>
            <input id="rFULInput" type="radio" name="outcome" value="followUp" class="revealNextReminder">
            <label for="rFULInput"> Follow up later </label>
            <input id="rDecInput" type="radio" name="outcome" value="declined" class="revealNextReminder">
            <label for="rDecInput"> Declined </label>
            <input id="rNoAnsInput" type="radio" name="outcome" value="noAns" class="hideNextReminder">
            <label for="rNoAnsInput"> No answer </label>        
            <br /> <br />
        </div>

        <div class="hidden rNextReminder" >
            <p class="popupHeader2"> Next reminder: </p>
            <div class="flex flex-ai-c flex-jc-sb">
                <div>
                    <input id="noReminderInput" type="checkbox" name="noReminder" class="noReminderInputClass">
                    <label for="noReminderInput"> No reminder </label>
                </div>
                <input type="date" id="rNewReminderInput" name="rDate"></input>
            </div>
            <br >
        </div>

        <!-- Add notes -->
        <span style="color: black;"> Add note: </span> <br />
        <div class="flex flex-jc-c">
            <textarea name="note" style="width: 260px;" cols="27" rows="3"></textarea>
        </div>
        <br />
        <!-- Previous notes -->
        <div id="popupNotesDiv">
            <p class="popupHeader2"> Client notes </p>
            <ul id="reminderPopupNotes" class="commentsList"></ul>
            <br />
        </div>
        
        <!-- Previous interactions, shown in awaiting, and follow up lists -->
        <div class="interactionsDiv">
            <p class="popupHeader2"> Previous interactions </p>
            <ul id="reminderPopupInteractions" class="commentsList"></ul>
            <br />
        </div>


        <!-- Client details link and Submit button -->
        <div style="text-align: center;">
            <a id="reminderPopupDetailsLink" class="color_secondary"> Client Details </a>
            <br /> <br />
            <button id="reminderPopupSubmitButton" type="button" class="button_primary"> Submit </button>
        </div>
    </form>
</div>
